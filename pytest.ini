[pytest]
# koo2 test configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    qt: Tests that require a Qt application (offscreen)

# Set offscreen platform for Qt tests
env =
    QT_QPA_PLATFORM=offscreen

# Coverage
# --cov-fail-under is intentionally omitted from the default run because
# UI tests are skipped when PySide6 is absent (CI without a display).
# Run with --cov-fail-under=80 locally once PySide6 is available.
addopts =
    -v
    --tb=short
    --cov=koo2
    --cov-report=term-missing
    --cov-report=html:htmlcov
